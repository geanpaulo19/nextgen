<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project — Gean Paulo</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Playfair+Display:ital,wght@1,400;1,700&display=swap" rel="stylesheet" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/work.css" />
</head>
<body>

  <div id="cur"></div>
  <div id="cur-f"></div>
  <div id="prog"></div>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="logo">GP</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#works">Work</a></li>
      <li><a href="index.html#services">Services</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
  </nav>

  <!-- BACK BUTTON -->
  <a href="index.html#works" class="wd-back">&#8592; All Work</a>

  <!-- HERO -->
  <div id="wd-hero">
    <div class="wd-hero-inner">
      <span id="wd-num">00</span>
      <h1 id="wd-title">Project Title</h1>
      <div id="wd-tags"></div>
    </div>
  </div>

  <!-- COVER IMAGE -->
  <div id="wd-cover"></div>

  <!-- BODY CONTENT -->
  <div class="wd-body">

    <!-- Left: overview + highlights -->
    <div class="wd-main">
      <span class="wd-section-label wd-fade">Overview</span>
      <p id="wd-summary" class="wd-fade"></p>

      <h2 class="wd-highlights-title wd-fade">Key Highlights</h2>
      <ul id="wd-highlights"></ul>
    </div>

    <!-- Right: meta sidebar -->
    <aside class="wd-sidebar">
      <div class="wd-meta-block wd-fade">
        <span class="wd-meta-label">Year</span>
        <span class="wd-meta-value" id="wd-year"></span>
      </div>
      <div class="wd-meta-block wd-fade">
        <span class="wd-meta-label">Role</span>
        <span class="wd-meta-value" id="wd-role"></span>
      </div>
      <div class="wd-meta-block wd-fade">
        <span class="wd-meta-label">Tech Stack</span>
        <div id="wd-stack"></div>
      </div>
      <div class="wd-meta-block wd-fade">
        <a id="wd-url-btn" href="#" class="wd-url-btn" target="_blank" rel="noopener">Visit Live Site &#8599;</a>
      </div>
    </aside>

  </div>

  <!-- PREV / NEXT NAV -->
  <nav class="wd-nav">
    <a id="wd-prev" href="#" class="wd-nav-link">
      <span class="wd-nav-dir">&#8592; Previous</span>
      <span class="wd-nav-title"></span>
    </a>
    <a id="wd-next" href="#" class="wd-nav-link">
      <span class="wd-nav-dir">Next &#8594;</span>
      <span class="wd-nav-title"></span>
    </a>
  </nav>

  <!-- Scroll progress -->
  <script>
    window.addEventListener('scroll', function () {
      document.getElementById('prog').style.width =
        (window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100) + '%';
    });
  </script>

  <!-- Cursor (reused from main) -->
  <script>
    (function () {
      var cur = document.getElementById('cur'), curf = document.getElementById('cur-f');
      var cx = 0, cy = 0, fx = 0, fy = 0;
      document.addEventListener('mousemove', function (e) { cx = e.clientX; cy = e.clientY; gsap.set(cur, { x: cx, y: cy }); });
      (function loop() { fx += (cx - fx) * .1; fy += (cy - fy) * .1; gsap.set(curf, { x: fx, y: fy }); requestAnimationFrame(loop); })();
      document.querySelectorAll('a, .wd-nav-link').forEach(function (el) {
        el.addEventListener('mouseenter', function () { document.body.classList.add('c-hover'); });
        el.addEventListener('mouseleave', function () { document.body.classList.remove('c-hover'); });
      });
    })();
  </script>

  <!-- Works data (must come before work-detail.js) -->
  <script src="js/works.js"></script>
  <script src="js/work-detail.js"></script>

</body>
</html>
